<script>
    // ===== ГЛОБАЛЬНЫЕ КОНСТАНТАНТЫ =====
    const DONATE_ID = '1508516';
    const SERVER_IP = 'mc-latysTime.ru';
    const ADMIN_PASSWORD = 'admin123';

    let selectedProduct = null;

    // ===== БАЗОВЫЕ НАБОРЫ ДАННЫХ ДЛЯ ВИТРИНЫ =====
    const defaultPrivileges = [
        { id: 1, name: 'Элита', price: 250 },
        { id: 2, name: 'Титан', price: 300 },
        { id: 3, name: 'Принц', price: 600 },
        { id: 4, name: 'Князь', price: 900 },
        { id: 5, name: 'Герцог', price: 1700 }
    ];

    const defaultServices = [
        { id: 6, name: 'Кейс с токенами', price: 15 },
        { id: 7, name: 'Монетный ключ', price: 10 },
        { id: 8, name: 'Размут', price: 80 },
        { id: 9, name: 'Разбан', price: 150 },
        { id: 10, name: 'Восстановление прав', price: 400 }
    ];

    // Загрузка списков товаров из локального хранилища браузера или из дефолтных массивов
    let privileges = JSON.parse(localStorage.getItem('p_list')) || defaultPrivileges;
    let services = JSON.parse(localStorage.getItem('s_list')) || defaultServices;

    // ===== РЕНДЕРИНГ ИНТЕРФЕЙСА ВИТРИНЫ =====
    function createCard(item, cat) {
        return `
            <div class="product-card">
                <div class="admin-controls">
                    <button class="admin-badge edit" onclick="editItem(${item.id}, '${cat}')" title="Редактировать">✏️</button>
                    <button class="admin-badge del" onclick="deleteItem(${item.id}, '${cat}')" title="Удалить">×</button>
                </div>
                <div class="name">${item.name}</div>
                <div class="price">${item.price} ₽</div>
                <button class="btn-buy" onclick="openModal('${item.name}', ${item.price})">Купить</button>
            </div>
        `;
    }

    function render() {
        document.getElementById('privilegesList').innerHTML = privileges.map(p => createCard(p, 'privileges')).join('');
        document.getElementById('servicesList').innerHTML = services.map(s => createCard(s, 'services')).join('');
    }

    // ===== УПРАВЛЕНИЕ АДМИН-ПАНЕЛЬЮ =====
    function checkAdminPassword() {
        const pass = prompt('Введите пароль администратора:');
        if (pass === ADMIN_PASSWORD) {
            toggleAdminMode(true);
        } else if (pass !== null) {
            alert('Доступ отклонен: введён неверный пароль.');
        }
    }

    function toggleAdminMode(show) {
        const panel = document.getElementById('adminPanel');
        if (show) {
            panel.classList.add('active');
            document.body.classList.add('admin-mode');
            panel.scrollIntoView({ behavior: 'smooth' });
        } else {
            panel.classList.remove('active');
            document.body.classList.remove('admin-mode');
        }
    }

    function editItem(id, cat) {
        const list = cat === 'privileges' ? privileges : services;
        const item = list.find(i => i.id === id);
        if (!item) return;

        document.getElementById('editId').value = item.id;
        document.getElementById('newProdName').value = item.name;
        document.getElementById('newProdPrice').value = item.price;
        document.getElementById('newProdCategory').value = cat;
        document.getElementById('submitFormBtn').innerText = 'Обновить товар';
        document.getElementById('adminPanel').scrollIntoView({ behavior: 'smooth' });
    }

    function saveForm() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('newProdName').value.trim();
        const price = parseInt(document.getElementById('newProdPrice').value);
        const cat = document.getElementById('newProdCategory').value;

        if (!name || isNaN(price) || price <= 0) {
            alert('Пожалуйста, заполните корректно все поля формы.');
            return;
        }

        // Очищаем старую копию при редактировании, чтобы предотвратить дублирование
        if (id) {
            const numId = parseInt(id);
            privileges = privileges.filter(i => i.id !== numId);
            services = services.filter(i => i.id !== numId);
        }

        const item = { id: id ? parseInt(id) : Date.now(), name, price };

        if (cat === 'privileges') {
            privileges.push(item);
        } else {
            services.push(item);
        }

        localStorage.setItem('p_list', JSON.stringify(privileges));
        localStorage.setItem('s_list', JSON.stringify(services));

        // Сброс состояния формы ввода
        document.getElementById('editId').value = '';
        document.getElementById('newProdName').value = '';
        document.getElementById('newProdPrice').value = '';
        document.getElementById('submitFormBtn').innerText = 'Сохранить товар';

        render();
        showToast();
    }

    function deleteItem(id, cat) {
        if (!confirm('Вы действительно хотите удалить выбранный товар из списка?')) return;
        
        if (cat === 'privileges') {
            privileges = privileges.filter(i => i.id !== id);
        } else {
            services = services.filter(i => i.id !== id);
        }

        localStorage.setItem('p_list', JSON.stringify(privileges));
        localStorage.setItem('s_list', JSON.stringify(services));
        render();
    }

    // ===== ОБРАБОТКА ПОКУПОК И ОКНА ОПЛАТЫ =====
    function openModal(name, price) {
        selectedProduct = { name, price };
        document.getElementById('modalProductName').innerText = name;
        document.getElementById('modalProductPrice').innerText = price + ' ₽';
        document.getElementById('modalOverlay').classList.add('active');
        document.getElementById('nicknameInput').focus();
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        document.getElementById('nicknameInput').value = '';
    }

    function confirmPurchase() {
        const nick = document.getElementById('nicknameInput').value.trim();
        if (!nick) {
            alert('Пожалуйста, введите ваш никнейм для выдачи товара.');
            return;
        }
        
        // Кодирование текстовых параметров комментария для URL ссылки DonatePay
        const comment = encodeURIComponent(`${nick} | Товар: ${selectedProduct.name}`);
        const finalUrl = `https://donatepay.ru{DONATE_ID}?amount=${selectedProduct.price}&comment=${comment}`;
        
        closeModal();
        window.open(finalUrl, '_blank');
    }

    // ===== СИСТЕМНЫЕ ФУНКЦИИ И ОНЛАЙН СЕРВЕРА =====
    function copyIP() {
        navigator.clipboard.writeText(SERVER_IP).then(() => {
            showToast();
        }).catch(() => {
            alert('Ошибка буфера. Скопируйте адрес вручную: ' + SERVER_IP);
        });
    }

    function showToast() {
        const t = document.getElementById('notification');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function updateOnline() {
        try {
            const res = await fetch(`https://mcsrvstat.us{SERVER_IP}`);
            const data = await res.json();
            document.getElementById('onlineCount').innerText = data.online ? data.players.online : '0';
        } catch {
            document.getElementById('onlineCount').innerText = '0';
        }
    }

    // Запуск процедур при полной готовности страницы
    window.onload = function() {
        render();
        updateOnline();
        setInterval(updateOnline, 30000); // Синхронизация онлайна каждые 30 секунд
    };
</script>
