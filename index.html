<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LatysTime — Premium Web Store</title>
    <style>
        /* ===== ПЕРЕМЕННЫЕ И ДИЗАЙН-СИСТЕМА ===== */
        :root {
            --bg-main: #06040a;
            --bg-card: rgba(15, 11, 25, 0.7);
            --bg-input: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(168, 85, 247, 0.2);
            --accent-orange: linear-gradient(135deg, #ff8a65 0%, #e65100 100%);
            --accent-purple: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            --text-primary: #f4eff6;
            --text-secondary: #9ca3af;
            --neon-green: #4ade80;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== ОБНУЛЕНИЕ СТИЛЕЙ ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #221933; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #372a4d; }

        body {
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Высокотехнологичный живой фон */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 90% 20%, rgba(230, 81, 0, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        .container { width: 100%; max-width: 1200px; padding: 60px 20px; z-index: 1; }

        /* ===== ПРЕМИУМ СТЕКЛЯННЫЙ МАКЕТ ===== */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 165, 0, 0.08);
            border-radius: var(--radius-xl);
            padding: 50px 40px;
            margin-bottom: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        .glass-card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        /* ===== ЛОГОТИП И ШАПКА ===== */
        .brand-header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 64px; font-weight: 900; letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 20%, #ffb74d 50%, #b388ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            position: relative; display: inline-block;
        }

        .hero-dashboard {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 30px; margin-top: 20px;
        }

        /* Панель адреса */
        .widget-ip {
            display: flex; align-items: center; background: rgba(0,0,0,0.3);
            padding: 8px 8px 8px 24px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ip-value { font-size: 18px; font-weight: 700; color: #ffcc80; margin-right: 20px; letter-spacing: 1px; }
        
        .btn-action-copy {
            background: var(--accent-orange); color: var(--bg-main);
            border: none; padding: 14px 28px; border-radius: 14px;
            font-size: 14px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.5px; transition: var(--transition);
        }
        .btn-action-copy:hover { transform: scale(1.03); box-shadow: 0 0 25px rgba(230, 81, 0, 0.4); }

        /* Живой статус онлайна */
        .widget-online {
            display: flex; align-items: center; gap: 16px;
            background: rgba(74, 222, 128, 0.03); border: 1px solid rgba(74, 222, 128, 0.15);
            padding: 14px 28px; border-radius: 20px;
        }
        .live-pulse-dot {
            width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green); animation: corePulse 2s infinite ease-in-out;
        }
        @keyframes corePulse { 0%, 100% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.25); opacity: 1; filter: drop-shadow(0 0 12px var(--neon-green)); } }
        .counter-num { font-size: 32px; font-weight: 900; color: var(--neon-green); line-height: 1; }
        .counter-lbl { font-size: 13px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* ===== ДИЗАЙН ЗАГОЛОВКОВ РАЗДЕЛОВ ===== */
        .section-title {
            font-size: 28px; font-weight: 800; color: #fff;
            padding-bottom: 20px; margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }
        .section-title::before {
            content: ''; position: absolute; bottom: -1px; left: 0;
            width: 100px; height: 2px; background: var(--accent-purple);
        }

        /* ===== ИННОВАЦИОННАЯ СЕТКА КАРТОЧЕК ===== */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; }
        
        .product-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            padding: 40px 24px; text-align: center;
            position: relative; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.4s, background 0.4s;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 280px;
        }
        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(168, 85, 247, 0.4);
            background: rgba(168, 85, 247, 0.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-icon-avatar {
            width: 54px; height: 54px; background: rgba(255,255,255,0.02);
            border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05); font-size: 24px; transition: var(--transition);
        }
        .product-card:hover .card-icon-avatar { background: var(--accent-purple); color: var(--bg-main); transform: scale(1.1); }

        .product-card .name { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .product-card .price { font-size: 22px; font-weight: 700; color: #c084fc; margin-bottom: 25px; }

        .btn-card-buy {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 14px; border-radius: 14px; font-size: 13px;
            font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: var(--transition); width: 100%;
        }
        .product-card:hover .btn-card-buy {
            background: var(--accent-purple); border-color: transparent; color: var(--bg-main); font-weight: 800;
        }

        /* Кнопки управления админа */
        .control-badge-group {
            position: absolute; top: 12px; right: 12px; display: none; gap: 8px; z-index: 5;
        }
        body.admin-mode .control-badge-group { display: flex; }
        
        .badge-btn {
            border: none; width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: #fff; transition: var(--transition);
        }
        .badge-btn.del { background: #ef4444; }
        .badge-btn.del:hover { background: #b91c1c; transform: scale(1.1); }
        .badge-btn.edit { background: #3b82f6; }
        .badge-btn.edit:hover { background: #1d4ed8; transform: scale(1.1); }

        /* ===== ПАНЕЛЬ АДМИНИСТРАТОРА (РАСШИРЕННАЯ) ===== */
        .admin-section {
            display: none; border: 2px dashed rgba(168, 85, 247, 0.4) !important;
            background: rgba(19, 13, 33, 0.9) !important;
        }
        .admin-section.active { display: block; animation: openPanel 0.4s ease-out; }
        @keyframes openPanel { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .admin-grid-layout { display: grid; grid-template-columns: 1fr 300px; gap: 40px; }
        .admin-core-form { display: flex; flex-direction: column; }
        
        .admin-stats-sidebar {
            background: rgba(0,0,0,0.2); border-radius: var(--radius-lg);
            padding: 24px; border: 1px solid rgba(255,255,255,0.03);
            display: flex; flex-direction: column; gap: 20px;
        }
        .stat-meta-box { display: flex; flex-direction: column; gap: 4px; }
        .stat-meta-box span { font-size: 13px; color: var(--text-secondary); }
        .stat-meta-box strong { font-size: 24px; color: #ffcc80; font-weight: 800; }

        /* ===== МОДЕРНИЗИРОВАННЫЙ КАССОВЫЙ МОДАЛ ===== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(4, 2, 7, 0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
